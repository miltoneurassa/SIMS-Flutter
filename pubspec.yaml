name: sims_v4
description: Student Information Management System - Cross Platform Mobile App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP requests
  http: ^1.2.1

  # Local storage
  shared_preferences: ^2.2.3

  # QR Code Scanner
  mobile_scanner: ^5.1.1

  # QR Code Generator
  qr_flutter: ^4.1.0

  # Icons
  cupertino_icons: ^1.0.6

  # Animations
  flutter_animate: ^4.5.0

  # Google Fonts
  google_fonts: ^6.2.1

  # Device info
  device_info_plus: ^10.1.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # Encryption (AES)
  encrypt: ^5.0.3

  # Image loading
  cached_network_image: ^3.3.1

  # Lottie animations
  lottie: ^3.1.2

  # WebView for HTML responses
  webview_flutter: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/placeholder.txt
